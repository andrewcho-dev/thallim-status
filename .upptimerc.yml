# Thallim Pulse — public status page (Upptime)
#
# Uptime checks run from GitHub Actions (external vantage, like a real customer),
# commit results to this repo's history/, and publish a status site with DAILY
# uptime history (Atlassian-style bars) + 1/7/30/365-day uptime to GitHub Pages.
# Docs: https://upptime.js.org/docs/configuration

owner: andrewcho-dev
repo: thallim-status

sites:
  - name: Web App & Dashboard
    url: https://pulse.thallim.com/
  - name: API
    url: https://pulse.thallim.com/healthz
  - name: Provisioning API
    url: https://api.thallim.com/health
  - name: Secure MQTT (mqtts 8883)
    check: tcp-ping
    url: mqtt.thallim.com
    port: 8883
  - name: MQTT (plain 1883)
    check: tcp-ping
    url: mqtt.thallim.com
    port: 1883
  - name: Identity Provider (OIDC)
    url: https://auth.thallim.com/.well-known/openid-configuration
  - name: Signup
    url: https://join.thallim.com/

status-website:
  # Custom domain — Upptime writes a CNAME file into gh-pages so GitHub Pages serves
  # the site at the apex of this host. DNS: status.thallim.com CNAME andrewcho-dev.github.io.
  cname: status.thallim.com
  name: Thallim Pulse Status
  introTitle: "**Thallim Pulse** — System Status"
  introMessage: Live availability of the Thallim Pulse IoT platform, monitored from outside the production cluster.
  logoUrl: https://raw.githubusercontent.com/andrewcho-dev/thallim-status/master/assets/logo.svg
  faviconSvg: https://raw.githubusercontent.com/andrewcho-dev/thallim-status/master/assets/logo.svg
  theme: light
  navbar:
    - title: Status
      href: /
    - title: Platform
      href: https://pulse.thallim.com
